<!DOCTYPE html>
<html>
<head>
  <title>PermitIntel OSINT</title>
</head>
<body style="font-family: sans-serif; padding: 20px; background: #0f172a; color: white;">
  <h1>PermitIntel OSINT</h1>
  <p>Live Worker: https://permit-intel.permit-intel.workers.dev/analyze</p>

  <button onclick="run()" style="padding:10px 16px; cursor:pointer;">Generate Deal Asset</button>

  <pre id="output" style="margin-top:20px; background:#111827; color:#86efac; padding:16px; white-space:pre-wrap;"></pre>

  <script>
    async function run() {
      const output = document.getElementById("output");
      output.innerText = "Running...";

      const res = await fetch("https://permit-intel.permit-intel.workers.dev/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          permit: {
            address: "123 Main St",
            city: "Yakima",
            description: "Restaurant remodel with electrical + plumbing upgrades",
            estimatedCost: 85000,
            applicant: "ABC Development LLC"
          }
        })
      });

      const data = await res.json();
      output.innerText = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
